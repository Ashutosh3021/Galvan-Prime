# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.override.yml — Development overrides
#
# Applied automatically on top of docker-compose.yml when running locally.
# NOT used in CI or production (only docker-compose.yml is used there).
#
# Differences from production:
#   - Hot-reload via uvicorn --reload
#   - Source code mounted for live editing without rebuilding
#   - ENVIRONMENT=development
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Override CMD to enable hot-reload
    command:
      - uvicorn
      - main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --log-level
      - debug
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    volumes:
      # Mount source for live reload — changes take effect without rebuild
      - ./backend:/app
      - chroma_data:/app/chroma_db
      - model_cache:/app/.cache
