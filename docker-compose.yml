# ─────────────────────────────────────────────────────────────────────────────
# GalvanR.A.G — docker-compose.yml
#
# Services:
#   db       — PostgreSQL 16  (metadata + users + query logs)
#   backend  — FastAPI app    (depends on db being healthy)
#
# Usage:
#   cp backend/.env.example backend/.env   # fill in your secrets
#   docker-compose up --build
#
# API:  http://localhost:8000
# Docs: http://localhost:8000/docs
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-galvan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-galvanpass}
      POSTGRES_DB:       ${POSTGRES_DB:-galvanrag}
    volumes:
      # Persist DB data across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Run schema.sql on first boot to create all tables
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      # Expose for local psql / Supabase Studio access during development.
      # Remove this in production.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-galvan} -d ${POSTGRES_DB:-galvanrag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to use the Docker service name
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-galvan}:${POSTGRES_PASSWORD:-galvanpass}@db:5432/${POSTGRES_DB:-galvanrag}
      CHROMA_PERSIST_DIR: /app/chroma_db
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      # Persist ChromaDB vectors across container restarts
      - chroma_data:/app/chroma_db
      # Persist HuggingFace / SentenceTransformer model cache
      - model_cache:/app/.cache
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  chroma_data:
  model_cache:
