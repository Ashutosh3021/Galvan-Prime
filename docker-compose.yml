# ─────────────────────────────────────────────────────────────────────────────
# GalvanR.A.G — docker-compose.yml
#
# Service:
#   backend  — FastAPI app (ChromaDB vectors persisted via named volume)
#
# Usage:
#   cp backend/.env.example backend/.env   # fill in your secrets
#   docker-compose up --build
#
# API:  http://localhost:8000
# Docs: http://localhost:8000/docs
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override ChromaDB persistence path inside the container
      CHROMA_PERSIST_DIR: /app/chroma_db
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      # Persist ChromaDB vectors across container restarts
      - chroma_data:/app/chroma_db
      # Persist HuggingFace / SentenceTransformer model cache
      - model_cache:/app/.cache
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  chroma_data:
  model_cache:
