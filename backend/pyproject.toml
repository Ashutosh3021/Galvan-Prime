[tool.ruff]
target-version = "py311"
line-length    = 100
exclude = [
    ".venv",
    "db/migrations/versions",
    "__pycache__",
]

[tool.ruff.lint]
select  = ["E", "W", "F", "I"]
ignore  = [
    "E501",   # line too long — handled by black
    "F401",   # imported but unused — some __init__.py re-exports are intentional
]

[tool.black]
line-length    = 100
target-version = ["py311"]
exclude        = '''
/(
    \.venv
  | db/migrations/versions
)/
'''

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]

[tool.coverage.run]
source   = ["."]
omit     = ["tests/*", "db/migrations/*", ".venv/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
